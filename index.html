<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>淘宝闪购粉丝福利</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

            background: linear-gradient(135deg, #FF6B35, #FF4757);

            line-height: 1.6;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #FF4757, #C44569);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 15px;
        }
        .btn:hover { opacity: 0.9; }
        .btn-secondary {
            background: #f5f5f5;
            color: #666;
            font-size: 14px;
        }
        .tip {
            font-size: 12px;

</html>
